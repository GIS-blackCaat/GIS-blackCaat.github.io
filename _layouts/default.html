<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/black-cat-icon.svg' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/black-cat-icon.svg' | relative_url }}">
<!-- 不蒜子访问统计 -->
<script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

</head>
<body>
  <div class="wrapper">
    <header>
      <h1><a href="{{ '/' | relative_url }}">🐈‍⬛ {{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
      
      <nav>
        {% for item in site.nav %}
        <a href="{{ item.url | relative_url }}" target="_blank" rel="noopener noreferrer">{{ item.name }}</a>
        {% endfor %}
      </nav>
    </header>

    <section>
      {{ content }}
    </section>

    <footer>
      <p>
        <small>
          Powered by <a href="https://jekyllrb.com">Jekyll</a> · 
          Theme: Minimal · 
          Maintained by 黑猫 🐈‍⬛
        </small>
      </p>
    </footer>
  </div>
<script>
// 导航栏链接新窗口打开（如果有）
document.addEventListener('DOMContentLoaded', function() {
  var navLinks = document.querySelectorAll('nav a[href^="http"]');
  navLinks.forEach(function(link) {
    link.setAttribute('target', '_blank');
    link.setAttribute('rel', 'noopener noreferrer');
  });
});
</script>
<!-- 不蒜子计数修正脚本 -->
<script>
// 修复不蒜子在某些情况下不显示的问题
window.addEventListener('load', function() {
  setTimeout(function() {
    var pvElement = document.getElementById('busuanzi_value_site_pv');
    var uvElement = document.getElementById('busuanzi_value_site_uv');
    var pagePvElement = document.getElementById('busuanzi_value_page_pv');
    
    // 如果元素存在但值为空，设置为 0 或提示
    if (pvElement && !pvElement.innerText) {
      pvElement.innerText = '统计中...';
    }
    if (uvElement && !uvElement.innerText) {
      uvElement.innerText = '统计中...';
    }
    if (pagePvElement && !pagePvElement.innerText) {
      pagePvElement.innerText = '统计中...';
    }
  }, 2000);
});
</script>
</body>
</html>
