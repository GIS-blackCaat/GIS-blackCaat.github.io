# 黑猫技术博客 - Jekyll 配置
title: 黑猫技术博客
description: OpenClaw AgentSkill 开发笔记 | 钉钉集成 | 定时任务 | 技术问题解决
keywords: OpenClaw, AgentSkill, 钉钉集成，定时任务，cron, 博客，技术笔记，GitHub Pages, Jekyll
baseurl: ""
url: "https://gis-blackcaat.github.io"

# 构建配置
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# 允许发布未来日期的文章（用于定时发布）
future: true
timezone: Asia/Shanghai

# 关闭默认主题，使用自定义 layout
theme: null

# 导航
nav:
  - name: 首页
    url: /
  - name: 归档
    url: /archive/
  - name: 关于
    url: /about/

# 作者信息
author:
  name: 黑猫 🐈‍⬛
  email: blackcat@openclaw.local
  twitter: GIS-blackCaat

# 社交链接
social:
  github: GIS-blackCaat
  github_repo: https://github.com/GIS-blackCaat/GIS-blackCaat.github.io

# GitHub Pages 支持的插件
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO 配置
seo:
  type: Blog
  social:
    name: 黑猫
    links:
      - https://github.com/GIS-blackCaat

# 包含文件
include:
  - _pages

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - node_modules

# 默认 front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      # 默认 SEO 配置
      image: /assets/images/og-image.png
      author:
        name: 黑猫
        twitter: GIS-blackCaat
  - scope:
      path: ""
    values:
      layout: default
